# Nginx Configuration for StudentLogger.com
# Production-ready with security headers and optimizations

upstream app {
    server localhost:3000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name studentlogger.com www.studentlogger.com;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name studentlogger.com www.studentlogger.com;

    # SSL/TLS Configuration
    ssl_certificate /etc/letsencrypt/live/studentlogger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studentlogger.com/privkey.pem;

    # SSL Security Best Practices
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Root directory
    root /home/ubuntu/studentlogger/dist;
    index index.html index.htm;

    # ============================================================
    # SECURITY HEADERS (100/100 Compliance)
    # ============================================================

    # Content Security Policy (CSP)
    # Prevents XSS, clickjacking, and injection attacks
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'wasm-unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        font-src 'self' data:;
        connect-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # X-Frame-Options (Clickjacking protection)
    # Prevents site from being embedded in iframes
    add_header X-Frame-Options "SAMEORIGIN" always;

    # X-Content-Type-Options (MIME type sniffing prevention)
    # Forces browser to respect Content-Type header
    add_header X-Content-Type-Options "nosniff" always;

    # X-XSS-Protection (Legacy XSS protection)
    # Enables browser's built-in XSS filters
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer-Policy (Control referrer information)
    # Prevents leaking referrer to external sites
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Permissions-Policy (Feature policy)
    # Restricts browser features and APIs
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # HSTS (HTTP Strict-Transport-Security)
    # Forces HTTPS for all future requests (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Additional Security Headers

    # Remove server version
    server_tokens off;

    # Disable client-side caching for HTML
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    # ============================================================
    # CACHING STRATEGY
    # ============================================================

    # Cache immutable assets (hashed filenames from Vite)
    location ~* /assets/.*\.(js|css)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Cache images and fonts longer
    location ~* \.(svg|png|jpg|jpeg|gif|ico|webp|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Cache static content moderately
    location ~* \.(txt|xml|json)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ============================================================
    # STATIC FILE SERVING
    # ============================================================

    # Serve robots.txt
    location = /robots.txt {
        try_files $uri =404;
        add_header Content-Type "text/plain; charset=utf-8";
        expires 7d;
    }

    # Serve sitemap
    location ~ /sitemap.*\.xml$ {
        try_files $uri =404;
        add_header Content-Type "application/xml; charset=utf-8";
        expires 7d;
    }

    # ============================================================
    # SPA ROUTING
    # ============================================================

    # All routes go to index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    # RATE LIMITING & PROTECTION
    # ============================================================

    # Apply general rate limit
    limit_req zone=general burst=20 nodelay;

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    # ============================================================
    # GZIP COMPRESSION
    # ============================================================

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml
               text/x-js text/x-component text/x-cross-domain-policy;
    gzip_disable "msie6";

    # ============================================================
    # LOGGING
    # ============================================================

    access_log /var/log/nginx/studentlogger_access.log;
    error_log /var/log/nginx/studentlogger_error.log warn;
}

# Redirect www to non-www (optional, remove if www is preferred)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.studentlogger.com;

    ssl_certificate /etc/letsencrypt/live/studentlogger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studentlogger.com/privkey.pem;

    return 301 https://studentlogger.com$request_uri;
}
