name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Verify build output
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful!"
            ls -la dist/ | head -10
          else
            echo "❌ Build failed - dist directory not found"
            exit 1
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_EC2_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Verify the key was decoded correctly
          head -1 ~/.ssh/deploy_key | grep -q "BEGIN OPENSSH PRIVATE KEY" || (echo "SSH key decode failed" && exit 1)
          ssh-keyscan -H ${{ secrets.AWS_EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2
        run: |
          # Remove old dist directory and create fresh one
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_EC2_HOST }} \
            "sudo rm -rf /var/www/studentlogger/dist && sudo mkdir -p /var/www/studentlogger/dist && sudo chown ubuntu:ubuntu /var/www/studentlogger/dist" || true

          # Copy dist folder using SCP
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r dist/ ubuntu@${{ secrets.AWS_EC2_HOST }}:/var/www/studentlogger/

          # Reload Nginx
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_EC2_HOST }} "sudo systemctl reload nginx"

      - name: Notify Deployment Success
        if: success()
        run: echo "✅ Deployment to AWS EC2 successful!"

      - name: Notify Deployment Failure
        if: failure()
        run: echo "❌ Deployment to AWS EC2 failed!"
