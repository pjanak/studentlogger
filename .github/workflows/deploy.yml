name: Build and Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
          DEPLOY_PATH: /var/www/studentlogger
        run: |
          # Create SSH key file
          mkdir -p ~/.ssh
          echo "$EC2_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

          # Add host to known_hosts
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Remove old dist directory on remote server to ensure clean deployment
          ssh -i ~/.ssh/ec2_key ${EC2_USER}@${EC2_HOST} "sudo rm -rf ${DEPLOY_PATH}/dist && sudo mkdir -p ${DEPLOY_PATH}/dist && sudo chown -R ${EC2_USER}:${EC2_USER} ${DEPLOY_PATH}/dist" || true

          # Deploy dist folder to EC2 with force option to override all files
          rsync -avz --force -e "ssh -i ~/.ssh/ec2_key" dist/ ${EC2_USER}@${EC2_HOST}:${DEPLOY_PATH}/dist/

          # Reload Nginx to pick up any config changes
          ssh -i ~/.ssh/ec2_key ${EC2_USER}@${EC2_HOST} "sudo systemctl reload nginx"

          echo "✅ Deployment to EC2 completed successfully!"
